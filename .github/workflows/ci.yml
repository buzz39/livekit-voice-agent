name: CI Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lockfile integrity ────────────────────────────────────────────
  lock-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Verify lockfile is up-to-date
        run: uv lock --check

  # ── 2. Unit + smoke tests ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Run smoke tests
        run: uv run pytest tests/test_smoke.py -v --tb=short

      - name: Run full test suite
        run: uv run pytest tests/ -v --tb=short

  # ── 3. Docker build smoke ──────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: livekit-voice-agent:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: false
          tags: livekit-voice-agent-server:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Deployment gate ─────────────────────────────────────────────
  deploy-gate:
    needs: [lock-check, test, docker-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: All smoke checks passed
        run: echo "✅ All smoke tests passed — safe to deploy"
